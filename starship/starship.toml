# --- General ---
add_newline = false
command_timeout = 500
scan_timeout = 10

# tmux 와 톤 통일 (색 변경 시 한 곳만 수정)
palette = "tmux"

# --- Prompt Format ---
# format 은 모든 [table] 헤더보다 앞 = 최상위 키여야 함.
# (테이블 아래에 두면 palettes.tmux.format 으로 묻혀서 무시됨)
format = """
$directory\
$git_branch\
$git_status\
$java\
$python\
$kotlin\
$nodejs\
$character"""

[palettes.tmux]
blue  = "#5294e2"  # tmux status bar
amber = "#ca8a04"  # tmux mode highlight (PREFIX/COPY)
red   = "#ef4444"  # tmux sync / error
green = "#22c55e"  # success

# --- Modules ---
[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$branch]($style) "
style = "bold amber"

# 더티 상태가 한눈에 보이도록 심볼/카운트 명시
[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "= "
ahead     = "⇡${count} "
behind    = "⇣${count} "
diverged  = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed   = '\$ '
modified  = "!${count} "
staged    = "+${count} "
renamed   = "»${count} "
deleted   = "✘${count} "

[character]
success_symbol = "[➜](bold green)"
error_symbol   = "[➜](bold red)"

# --- Claude Code statusline ---
# settings.json 의 statusLine 을 "starship statusline claude-code" 로 두면 렌더됨.
# directory/git_branch/git_status 는 위 프롬프트 모듈 설정을 그대로 재사용 → 셸 프롬프트와 색 일치.
[profiles]
claude-code = "$directory$git_branch$git_status$claude_model$claude_context"

[claude_model]
format = "[|](dimmed) [$model](purple) "

[claude_context]
format = "[|](dimmed) ctx:[$percentage](cyan) "
