# mouse support
set -g mouse on

# 256 color support
set -g default-terminal "tmux-256color"

# remove ESC delay
set -sg escape-time 0

# scrollback buffer
set -g history-limit 50000

# start index from 1
set -g base-index 1
setw -g pane-base-index 1

# toggle synchronized panes (Ctrl+B → Shift+S)
bind-key S set-window-option synchronize-panes

