# --- General ---
set -g mouse on
set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -g history-limit 50000

# --- Window ---
set -g base-index 1
setw -g pane-base-index 1

# --- Status Bar ---
set -g status-style "bg=#5294e2,fg=#ffffff"
set -g status-left "#{?client_prefix,#[bg=#e5c07b#,fg=#282c34] PREFIX ,} "
set -g window-status-current-style "fg=#ffffff,bg=#3a6db5,bold"

# --- Keybindings ---
bind-key S set-window-option synchronize-panes
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"

# 드래그 선택 후 copy-mode 유지 (스크롤 위치 점프 방지)
unbind -T copy-mode MouseDragEnd1Pane
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection

# 휠 스크롤 부드럽게 (기본 5줄 → 1줄)
# 아래 방향은 바닥 닿으면 copy-mode 자동 종료
bind -T copy-mode    WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode-vi WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode    WheelDownPane {
    if -F "#{e|>=:#{scroll_position},1}" "send -N1 -X scroll-down" "send -X cancel"
}
bind -T copy-mode-vi WheelDownPane {
    if -F "#{e|>=:#{scroll_position},1}" "send -N1 -X scroll-down" "send -X cancel"
}

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

# tmux-sensible 의 word-separators 덮어쓰기 (URL/경로 한 단어로 인식)
# - 플러그인 로드 이후에 설정해야 적용됨
set -g word-separators " "
