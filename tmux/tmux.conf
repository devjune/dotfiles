# --- Colors ---
# 팔레트 변수 (색 변경 시 한 곳만 수정)
set -g @c_bg      "#5294e2"  # status bar 평소 (파랑)
set -g @c_bg_hl   "#3a6db5"  # 현재 윈도우 탭 (짙은 파랑)
set -g @c_mode    "#ca8a04"  # 모드 강조 (PREFIX/copy-mode)
set -g @c_text    "#ffffff"  # 밝은 텍스트
set -g @c_text_dk "#282c34"  # 강조 배경 위 어두운 텍스트

# --- General ---
set -g mouse on
set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -g history-limit 50000

# --- Window/Pane ---
set -g base-index 1
setw -g pane-base-index 1

# --- Status Bar ---
set -g status-style "bg=#{@c_bg},fg=#{@c_text}"
set -g window-status-current-style "bg=#{@c_bg_hl},fg=#{@c_text},bold"
# 인디케이터가 잘리지 않도록 충분한 폭 확보
set -g status-left-length 50
# 좌측 인디케이터 (PREFIX 키 대기 / copy-mode 진입 시 표시)
set -g status-left "#{?client_prefix,#[bg=#{@c_mode}#,fg=#{@c_text_dk}] PREFIX ,}#{?pane_in_mode,#[bg=#{@c_mode}#,fg=#{@c_text_dk}#,bold] COPY #{scroll_position}↑ ,} "

# --- Pane Borders & Modes ---
# heavy 박스 문자로 시각적 두께 ↑
set -g pane-border-lines heavy
# active 페인 테두리: 평소 파랑, copy-mode 진입 시 강조색
set -g pane-active-border-style "#{?pane_in_mode,fg=#{@c_mode},fg=#{@c_bg}}"
# 페인 상단에 프로그램이 set 한 터미널 타이틀 표시 (예: claude code 세션명)
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "
# copy-mode 우상단 인디케이터 + 드래그 선택 색
set -g mode-style "bg=#{@c_mode},fg=#{@c_text_dk}"

# --- Keybindings ---
bind-key S set-window-option synchronize-panes
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"
# 현재 페인 스크롤백을 vim 팝업으로 열기 (검색/복사/저장 용이)
bind v capture-pane -S -10000 \; save-buffer /tmp/tcap.log \; display-popup -E -w 90% -h 90% 'vim /tmp/tcap.log'

# --- Copy-mode (Mouse) ---
# 드래그 선택 후 copy-mode 유지 (스크롤 위치 점프 방지)
unbind -T copy-mode    MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
bind   -T copy-mode    MouseDragEnd1Pane send-keys -X copy-selection
bind   -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
# 휠 스크롤 부드럽게 (기본 5줄 → 1줄), 바닥 닿으면 copy-mode 자동 종료
bind -T copy-mode    WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode-vi WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode    WheelDownPane {
    if -F "#{e|>=:#{scroll_position},1}" "send -N1 -X scroll-down" "send -X cancel"
}
bind -T copy-mode-vi WheelDownPane {
    if -F "#{e|>=:#{scroll_position},1}" "send -N1 -X scroll-down" "send -X cancel"
}

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'

# tmux-sensible 의 word-separators 덮어쓰기 (URL/경로 한 단어로 인식)
# - 플러그인 로드 이후에 설정해야 적용됨
set -g word-separators " "
